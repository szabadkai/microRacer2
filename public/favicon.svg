<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0d0d0d"/>
  
  <!-- Racing car - top view -->
  <g filter="url(#glow)">
    <!-- Car body -->
    <path d="M32 8 L40 16 L42 28 L42 44 L38 52 L26 52 L22 44 L22 28 L24 16 Z" 
          fill="#00ffcc" stroke="#00ffcc" stroke-width="1"/>
    
    <!-- Cockpit/cockpit area -->
    <ellipse cx="32" cy="26" rx="5" ry="8" fill="#0d0d0d"/>
    
    <!-- Front wing -->
    <rect x="18" y="10" width="28" height="4" rx="2" fill="#00ccff"/>
    
    <!-- Rear wing -->
    <rect x="20" y="50" width="24" height="4" rx="2" fill="#00ccff"/>
    
    <!-- Side pods -->
    <rect x="22" y="32" width="6" height="12" rx="2" fill="#00ddbb"/>
    <rect x="36" y="32" width="6" height="12" rx="2" fill="#00ddbb"/>
    
    <!-- Front wheels -->
    <rect x="14" y="14" width="6" height="10" rx="2" fill="#1a1a1a" stroke="#00ffcc" stroke-width="1"/>
    <rect x="44" y="14" width="6" height="10" rx="2" fill="#1a1a1a" stroke="#00ffcc" stroke-width="1"/>
    
    <!-- Rear wheels -->
    <rect x="14" y="42" width="6" height="12" rx="2" fill="#1a1a1a" stroke="#00ffcc" stroke-width="1"/>
    <rect x="44" y="42" width="6" height="12" rx="2" fill="#1a1a1a" stroke="#00ffcc" stroke-width="1"/>
    
    <!-- Number -->
    <text x="32" y="48" font-family="Arial Black, sans-serif" font-size="8" fill="#0d0d0d" text-anchor="middle" font-weight="bold">2</text>
  </g>
</svg>